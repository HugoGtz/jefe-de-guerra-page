name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping deploys; cancel a superseded run.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install deps
        run: npm ci

      # Quality gate: fail the deploy if types/Svelte don't check out.
      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # name + output dir come from wrangler.toml; functions/ auto-deploys.
          command: pages deploy --branch=main
